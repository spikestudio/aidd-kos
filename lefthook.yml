# lefthook version: 2.1.9 | Date: 2026-06-03

pre-commit:
  parallel: true
  commands:
    ruff-check:
      glob: "*.py"
      run: uv run ruff check {staged_files}
    ruff-format:
      glob: "*.py"
      run: uv run ruff format --check {staged_files}
    markdownlint:
      glob: "*.md"
      run: mise exec -- markdownlint-cli2 {staged_files}
    taplo:
      glob: "*.toml"
      run: mise exec -- taplo fmt --check {staged_files}
    actionlint:
      glob: ".github/workflows/*.yml"
      run: actionlint {staged_files}

pre-push:
  commands:
    test:
      run: uv run pytest -m "not integration"
