name: Merge Guard

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize, labeled, unlabeled]

jobs:
  skip-epic-check:
    name: Epic Complete Check
    runs-on: ubuntu-latest
    if: "!startsWith(github.head_ref, 'feature/')"
    permissions:
      statuses: write
    steps:
      - name: Skip Epic check for non-feature branches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.event.pull_request.head.sha }}
          STATUS_CONTEXT: Epic Complete Check
        run: |
          gh api "repos/${{ github.repository }}/statuses/$SHA" \
            --method POST \
            --field state=success \
            --field context="$STATUS_CONTEXT" \
            --field description="Skipped — non-feature branch" || true

  check-epic-complete:
    name: Epic Complete Check
    runs-on: ubuntu-latest
    if: startsWith(github.head_ref, 'feature/')
    permissions:
      pull-requests: read
      issues: read
      statuses: write
    steps:
      - name: Check all Epic Tasks are closed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.event.pull_request.head.sha }}
          STATUS_CONTEXT: Epic Complete Check
        run: |
          # PR body から Epic Issue 番号を取得
          EPIC_NUMBER=$(gh pr view ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --json body --jq '.body' \
            | grep -iE "(^|[[:space:]])Epic:[[:space:]]+#[0-9]+" \
            | head -1 \
            | sed -E 's/.*[Ee]pic:[[:space:]]+#([0-9]+).*/\1/')

          if [ -z "$EPIC_NUMBER" ]; then
            gh api "repos/${{ github.repository }}/statuses/$SHA" \
              --method POST \
              --field state=failure \
              --field context="$STATUS_CONTEXT" \
              --field description="PR body に Epic: #NNN がありません" || true
            echo "::error::PR body に 'Epic: #NNN' がありません。PR body の先頭行付近に行頭から 'Epic: #123' の形式（単独行）で追記してください。Task の close は別行に 'Closes #NNN' で記載します。"
            exit 1
          fi

          echo "Epic Issue #${EPIC_NUMBER} の全 Task クローズ確認..."

          OPEN_TASKS=$(gh api \
            "repos/${{ github.repository }}/issues/${EPIC_NUMBER}/sub_issues" \
            --paginate \
            --jq '[.[] | select(.state == "open")] | length' 2>/dev/null) || true

          if ! echo "$OPEN_TASKS" | grep -qE '^[0-9]+$'; then
            gh api "repos/${{ github.repository }}/statuses/$SHA" \
              --method POST \
              --field state=failure \
              --field context="$STATUS_CONTEXT" \
              --field description="sub_issues API の取得に失敗しました" || true
            echo "::error::Epic sub-issues の取得に失敗しました。GitHub sub-issues API が有効か確認してください。"
            exit 1
          fi

          if [ "$OPEN_TASKS" -gt 0 ]; then
            gh api "repos/${{ github.repository }}/statuses/$SHA" \
              --method POST \
              --field state=failure \
              --field context="$STATUS_CONTEXT" \
              --field description="未クローズの Task が ${OPEN_TASKS} 件あります" || true
            echo "::error::Epic #${EPIC_NUMBER} にクローズされていない Task が ${OPEN_TASKS} 件あります。全 Task をクローズしてから PR をマージしてください。"
            exit 1
          fi

          gh api "repos/${{ github.repository }}/statuses/$SHA" \
            --method POST \
            --field state=success \
            --field context="$STATUS_CONTEXT" \
            --field description="All Epic Tasks are closed" || true
          echo "✅ Epic #${EPIC_NUMBER} の全 Task がクローズされています。"

  check-gates:
    name: Merge Gate Check
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      statuses: write
    steps:
      - name: Verify all gate labels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.event.pull_request.head.sha }}
          STATUS_CONTEXT: Merge Gate Check
        run: |
          LABELS=$(gh pr view ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --json labels --jq '.labels[].name')

          MISSING=""
          for gate in "gate:reviewed"; do
            if ! echo "$LABELS" | grep -qx "$gate"; then
              MISSING="${MISSING}  - ${gate}\n"
            fi
          done

          if [ -n "$MISSING" ]; then
            gh api "repos/${{ github.repository }}/statuses/$SHA" \
              --method POST \
              --field state=failure \
              --field context="$STATUS_CONTEXT" \
              --field description="Missing required gate labels" || true
            echo "::error::Missing required gate labels"
            echo ""
            echo "This PR cannot be merged until all gates are passed:"
            printf '%b' "$MISSING"
            echo ""
            echo "Gates:"
            echo "  gate:reviewed  → /aidd-review epic PASS"
            exit 1
          fi

          gh api "repos/${{ github.repository }}/statuses/$SHA" \
            --method POST \
            --field state=success \
            --field context="$STATUS_CONTEXT" \
            --field description="All gate labels present" || true
          echo "✅ All gate labels present. Merge is allowed."

